services:
  - type: web
    name: regulatory-watch
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: FETCH_INTERVAL
        value: "30"
      - key: PYTHON_VERSION
        value: "3.12.0"
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
