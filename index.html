<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regulatory Watch</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui;background:#f5f6f8;color:#111}

.header{background:linear-gradient(135deg,#0f172a,#1d4ed8);color:#fff;padding:18px 20px}
.title{font-size:20px;font-weight:600}
.badge{margin-top:6px;font-size:12px;opacity:.8}

.toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
input,button{border-radius:8px;border:1px solid #ddd;padding:6px 10px;font-size:12px}
button{cursor:pointer;background:#fff}
button:hover{background:#eee}

.container{max-width:900px;margin:20px auto;padding:0 16px}

.group{margin-bottom:24px}
.group-title{font-size:13px;font-weight:600;color:#6b7280;margin-bottom:10px}

.card{
background:#fff;
padding:14px;
border-radius:14px;
box-shadow:0 2px 8px rgba(0,0,0,.05);
margin-bottom:10px;
transition:.15s;
}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.08)}

.card-title{font-size:14px;font-weight:600;margin-bottom:6px}
.card-date{font-size:11px;color:#6b7280}

.loading{text-align:center;padding:40px;color:#6b7280}
</style>
</head>
<body>

<div class="header">
<div class="title">Regulatory Watch</div>
<div class="badge" id="range-badge">Range completo</div>

<div class="toolbar">
<input type="date" id="date-from">
<input type="date" id="date-to">
<button id="reset">Reset</button>
<button data-range="7">7g</button>
<button data-range="30">30g</button>
<button data-range="90">90g</button>
</div>
</div>

<div class="container">
<div id="news"></div>
</div>

<script>
let allNews=[];
let from="";
let to="";

async function load(){
 document.getElementById('news').innerHTML='<div class="loading">Caricamento...</div>';
 try{
  const res=await fetch('/api/news');
  allNews=await res.json();
  render();
 }catch{
  document.getElementById('news').innerHTML='Errore API';
 }
}

function groupByDate(arr){
 const map={};
 arr.forEach(n=>{
  const d=n.date.split('T')[0];
  if(!map[d]) map[d]=[];
  map[d].push(n);
 });
 return map;
}

function format(d){return new Date(d).toLocaleDateString('it-IT')}

function render(){
 let data=allNews;

 if(from) data=data.filter(n=>n.date>=from);
 if(to) data=data.filter(n=>n.date<=to);

 data.sort((a,b)=>new Date(b.date)-new Date(a.date));

 const badge=document.getElementById('range-badge');
 badge.innerText=(from||to)?`${from||'inizio'} → ${to||'oggi'}`:'Range completo';

 const grouped=groupByDate(data);

 let html='';
 Object.keys(grouped).forEach(date=>{
  html+=`<div class="group">
   <div class="group-title">${format(date)}</div>`;

  grouped[date].forEach(n=>{
   html+=`<div class="card">
    <div class="card-title">${n.title}</div>
    <div class="card-date">${format(n.date)}</div>
   </div>`;
  });

  html+='</div>';
 });

 document.getElementById('news').innerHTML = html || 'Nessun risultato';
}

// events

document.getElementById('date-from').oninput=e=>{from=e.target.value;render()}
document.getElementById('date-to').oninput=e=>{to=e.target.value;render()}

document.getElementById('reset').onclick=()=>{
 from='';to='';
 document.getElementById('date-from').value='';
 document.getElementById('date-to').value='';
 render();
}

document.querySelectorAll('[data-range]').forEach(btn=>{
 btn.onclick=()=>{
  const days=btn.dataset.range;
  const t=new Date();
  const p=new Date();
  p.setDate(t.getDate()-days);
  const f=d=>d.toISOString().split('T')[0];
  from=f(p);to=f(t);
  document.getElementById('date-from').value=from;
  document.getElementById('date-to').value=to;
  render();
 }
});

load();
</script>

</body>
</html>
